  (function(){
    const pref=localStorage.getItem('lifehq_theme')||'auto';
    const dark=window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.setAttribute('data-theme',pref==='auto'?(dark?'dark':'light'):pref);
  })();
</script>

<style>
/* ─── Dark theme (default) ─────────────────────────────────────────────────── */
:root,[data-theme="dark"]{
  --bg:#0F0F13;
  --surface:#18181D;
  --surface2:#222229;
  --surface3:#2A2A33;
  --border:#2C2C38;
  --text:#F0F0F8;
  --text2:#C0C0D0;
  --muted:#7878A0;
  --accent:#00A8E8;
  --accent-dim:rgba(0,168,232,.15);
  --green:#00D632;
  --green-dim:rgba(0,214,50,.15);
  --red:#FF3B30;
  --red-dim:rgba(255,59,48,.15);
  --orange:#FF9F0A;
  --orange-dim:rgba(255,159,10,.15);
  --purple:#9B7FFF;
  --purple-dim:rgba(155,127,255,.12);
  --shadow:rgba(0,0,0,.4);
  --radius:14px;
  --tap:52px;
}
/* ─── Light theme ──────────────────────────────────────────────────────────── */
[data-theme="light"]{
  --bg:#F2F2F7;
  --surface:#FFFFFF;
  --surface2:#F2F2F7;
  --surface3:#E8E8EF;
  --border:#D1D1D6;
  --text:#1C1C1E;
  --text2:#48484A;
  --muted:#8E8E93;
  --accent:#00A8E8;
  --accent-dim:rgba(0,168,232,.12);
  --green:#34C759;
  --green-dim:rgba(52,199,89,.12);
  --red:#FF3B30;
  --red-dim:rgba(255,59,48,.12);
  --orange:#FF9500;
  --orange-dim:rgba(255,149,0,.12);
  --purple:#9B7FFF;
  --purple-dim:rgba(155,127,255,.1);
  --shadow:rgba(0,0,0,.12);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;transition:background .2s,color .2s}

/* ─── Sign-in ─────────────────────────────────────────────────────────────── */
#signin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:28px;padding:40px 24px;text-align:center}
.signin-logo{font-size:64px;line-height:1}
.signin-title{font-size:30px;font-weight:700;letter-spacing:-.5px}
.signin-sub{font-size:15px;color:var(--muted);max-width:280px;line-height:1.6;margin-top:6px}
.signin-btn{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 24px;font-size:16px;font-weight:600;color:var(--text);cursor:pointer;width:100%;max-width:300px;justify-content:center;transition:background .15s}
.signin-btn:active{background:var(--surface2)}
.signin-btn svg{width:22px;height:22px;flex-shrink:0}

/* ─── App shell ───────────────────────────────────────────────────────────── */
#app{display:none;flex-direction:column;flex:1;overflow:hidden}

/* ─── Header ─────────────────────────────────────────────────────────────── */
.header{background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.header-row1{display:flex;align-items:center;padding:14px 16px 12px;gap:10px}
.header-logo{display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
.header-logo-icon{font-size:22px;color:var(--accent)}
.header-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.header-search{flex:1;display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px}
.header-search .ph{font-size:16px;color:var(--muted);flex-shrink:0}
.header-search input{background:transparent;border:none;outline:none;font-size:14px;color:var(--text);width:100%}
.header-search input::placeholder{color:var(--muted)}

/* ─── Tabs ────────────────────────────────────────────────────────────────── */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 2px 8px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none;gap:2px}
.tab-label{font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap;letter-spacing:.01em;transition:color .15s}
.tab-count{font-size:16px;font-weight:700;color:var(--muted);transition:color .15s;line-height:1}
.tab.active .tab-label{color:var(--accent)}
.tab.active .tab-count{color:var(--accent)}
.tab.active{border-bottom-color:var(--accent)}
.tab:active{background:var(--surface2)}

/* ─── Main layout ─────────────────────────────────────────────────────────── */
.main{display:flex;flex:1;overflow:hidden}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ─── Task list ───────────────────────────────────────────────────────────── */
.task-list{flex:1;overflow-y:auto;padding:10px 14px 100px;display:flex;flex-direction:column}

/* Area group */
.area-group{margin-bottom:4px}
.area-group-header{display:flex;align-items:center;gap:8px;padding:14px 4px 8px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.area-group-header .ph{font-size:16px;color:var(--accent)}
.area-group-tasks{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.area-group-empty{font-size:13px;color:var(--muted);padding:8px 4px 16px;font-style:italic}

/* Swipe wrapper */
.task-wrapper{position:relative;border-radius:var(--radius);overflow:hidden;flex-shrink:0}
.swipe-bg{position:absolute;inset:0;display:flex;align-items:center;border-radius:var(--radius)}
.swipe-bg-right{background:var(--green);padding-left:20px;justify-content:flex-start;opacity:0}
.swipe-bg-right .ph{font-size:26px;color:#fff}
.swipe-bg-left{background:var(--red);padding-right:20px;justify-content:flex-end;opacity:0}
.swipe-bg-left .ph{font-size:26px;color:#fff}

.task-card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;gap:12px;align-items:flex-start;will-change:transform;z-index:1;transition:box-shadow .15s}
.task-card.done{opacity:.4}
.task-card.done .task-title{text-decoration:line-through;color:var(--muted)}

.task-check{width:24px;height:24px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.task-check:active{transform:scale(.9)}
.task-check.checked{background:var(--green);border-color:var(--green)}
.task-check.checked .ph{color:#fff;font-size:14px}
.task-check .ph{font-size:14px;color:var(--muted)}

.task-body{flex:1;min-width:0}
.task-title{font-size:15px;font-weight:500;margin-bottom:4px;line-height:1.4}
.task-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.tag{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.tag-deadline{background:var(--orange-dim);color:var(--orange)}
.tag-deadline.overdue{background:var(--red-dim);color:#FF6B63;font-weight:700}
.task-notes{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.5}
.task-blocked{font-size:12px;color:var(--orange);margin-top:4px;display:flex;align-items:center;gap:4px}
.task-blocked .ph{font-size:13px}
.task-actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .15s}
@media(max-width:700px){.task-actions{opacity:1}}
.task-card:hover .task-actions{opacity:1}
.icon-btn{width:36px;height:36px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .1s}
.icon-btn:hover{background:var(--surface2)}
.icon-btn:active{background:var(--border)}
.icon-btn.delete:active .ph{color:var(--red)}
.icon-btn.edit:active .ph{color:var(--accent)}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted);width:100%}
.empty-state .ph{font-size:48px;display:block;margin-bottom:12px;color:var(--border)}
.empty-state p{font-size:15px}

/* ─── Weekly view ─────────────────────────────────────────────────────────── */
.weekly-view{flex:1;overflow-y:auto;padding:14px 14px 100px;display:none;flex-direction:column;gap:12px}
.weekly-title{font-size:20px;font-weight:700;letter-spacing:-.3px}
.weekly-date{font-size:13px;color:var(--muted);margin-top:2px;margin-bottom:4px}
.weekly-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.weekly-section-header{padding:14px 16px;font-weight:600;font-size:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;border-radius:var(--radius) var(--radius) 0 0}
.weekly-section-header .ph{font-size:18px}
.weekly-section-body{padding:0 16px}
.weekly-task-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.weekly-task-row:last-child{border-bottom:none}
.weekly-task-row .task-label{flex:1;font-size:14px;line-height:1.3}
.weekly-task-row .area-badge{font-size:11px;color:var(--muted);white-space:nowrap}

/* ─── Bottom nav ──────────────────────────────────────────────────────────── */
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.bottom-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-size:10px;font-weight:500;min-height:60px;transition:color .15s;-webkit-tap-highlight-color:transparent}
.bottom-nav-btn .ph{font-size:24px;transition:color .15s}
.bottom-nav-btn.active{color:var(--accent)}
.bottom-nav-btn.active .ph{color:var(--accent)}
.bottom-nav-btn:active{opacity:.7}

/* ─── Toast ───────────────────────────────────────────────────────────────── */
#toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--surface3);border:1px solid var(--border);border-radius:20px;padding:10px 20px;font-size:14px;font-weight:500;color:var(--text);z-index:400;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px var(--shadow)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── Modals ──────────────────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:92dvh;overflow:hidden;display:flex;flex-direction:column}
.modal-handle-wrap{padding:12px 20px 0;flex-shrink:0}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto}
.modal-header{padding:16px 20px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border)}
.modal-title{font-size:17px;font-weight:700;letter-spacing:-.2px}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.modal-close .ph{font-size:16px}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px}
.modal-footer{padding:12px 20px;padding-bottom:calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0}
.modal-footer .btn{flex:1}

.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
.form-input,.form-select,.form-textarea{padding:14px;border:1px solid var(--border);border-radius:12px;font-size:15px;font-family:inherit;outline:none;background:var(--surface2);color:var(--text);transition:border-color .15s;width:100%;-webkit-appearance:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-select option{background:var(--surface2)}
.form-textarea{resize:vertical;min-height:80px;line-height:1.5}

.btn{padding:15px;border-radius:12px;border:none;cursor:pointer;font-size:15px;font-weight:600;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;min-height:52px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{background:#0090C8}
.btn-ghost{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.btn-ghost:active{background:var(--border)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,59,48,.3)}
.btn-danger:active{opacity:.8}

/* ─── Theme picker ────────────────────────────────────────────────────────── */
.theme-picker{display:flex;gap:0;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:4px;overflow:hidden}
.theme-opt{flex:1;padding:9px 4px;border-radius:9px;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.theme-opt .ph{font-size:15px}
.theme-opt.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px var(--shadow)}

/* ─── Areas bottom sheet ─────────────────────────────────────────────────── */
.areas-sheet-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:10px 4px 4px}
.areas-sheet-item{display:flex;align-items:center;gap:12px;padding:14px 12px;border-radius:12px;cursor:pointer;font-size:15px;color:var(--muted);min-height:var(--tap);transition:all .12s}
.areas-sheet-item .ph{font-size:22px;flex-shrink:0}
.areas-sheet-item:active{background:var(--surface2)}
.areas-sheet-item.active{background:var(--accent-dim);color:var(--accent)}
.areas-sheet-item.active .ph{color:var(--accent)}
.areas-sheet-item-text{flex:1;font-weight:500}
.areas-sheet-count{font-size:12px;background:var(--surface2);border-radius:10px;padding:2px 8px;color:var(--muted)}
.areas-sheet-item.active .areas-sheet-count{background:var(--accent);color:#fff}
.areas-divider{height:1px;background:var(--border);margin:4px 0}

/* ─── Blocked-by picker ───────────────────────────────────────────────────── */
.blocked-picker-search{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:10px}
.blocked-picker-search .ph{font-size:16px;color:var(--muted)}
.blocked-picker-search input{background:transparent;border:none;outline:none;font-size:14px;color:var(--text);flex:1}
.blocked-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.blocked-chip{display:flex;align-items:center;gap:5px;background:var(--accent-dim);border:1px solid var(--accent);border-radius:20px;padding:5px 10px;font-size:12px;color:var(--accent);cursor:pointer}
.blocked-chip .ph{font-size:12px}
.picker-task-list{display:flex;flex-direction:column;gap:2px}
.picker-task-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;cursor:pointer;transition:background .1s}
.picker-task-item:active{background:var(--surface2)}
.picker-task-item.selected{background:var(--accent-dim)}
.picker-checkbox{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.picker-task-item.selected .picker-checkbox{background:var(--accent);border-color:var(--accent)}
.picker-checkbox .ph{font-size:13px;color:#fff}
.picker-task-title{font-size:14px;flex:1;line-height:1.3}
.picker-task-area{font-size:11px;color:var(--muted)}
.blocked-field{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;min-height:52px;transition:border-color .15s}
.blocked-field:active{border-color:var(--accent)}
.blocked-field .ph{font-size:18px;color:var(--muted);flex-shrink:0}
.blocked-field-content{flex:1;display:flex;flex-wrap:wrap;gap:5px}
.blocked-field-placeholder{color:var(--muted);font-size:15px}
.blocked-field-chips{display:flex;flex-wrap:wrap;gap:5px}
.bf-chip{background:var(--accent-dim);border:1px solid var(--accent);border-radius:20px;padding:3px 9px;font-size:12px;color:var(--accent)}

/* ─── Settings ────────────────────────────────────────────────────────────── */
.settings-area-item{display:flex;align-items:center;gap:10px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.settings-area-icon{font-size:22px;flex-shrink:0;width:36px;text-align:center;color:var(--muted)}
.settings-area-input{flex:1;background:transparent;border:none;outline:none;font-size:15px;color:var(--text);font-family:inherit}
.settings-area-del{width:36px;height:36px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);border-radius:8px;flex-shrink:0}
.settings-area-del:active{background:var(--red-dim)}
.settings-area-del .ph{font-size:20px}
.settings-area-del:active .ph{color:var(--red)}
.settings-add-area{display:flex;align-items:center;gap:10px;padding:14px 12px;border-radius:12px;border:1px dashed var(--border);cursor:pointer;color:var(--accent);font-size:14px;font-weight:500;width:100%;background:transparent;transition:background .15s;margin-bottom:8px}
.settings-add-area:active{background:var(--accent-dim)}
.settings-add-area .ph{font-size:20px}
.settings-divider{height:1px;background:var(--border);margin:16px 0}
.settings-signout{display:flex;align-items:center;gap:10px;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;color:var(--red);font-size:15px;font-weight:500;width:100%;justify-content:center}
.settings-signout .ph{font-size:20px}
.settings-signout:active{opacity:.7}

/* ─── Delete area modal ────────────────────────────────────────────────────── */
.migrate-warning{display:flex;gap:10px;padding:14px;background:var(--red-dim);border-radius:12px;border:1px solid rgba(255,59,48,.25);font-size:14px;line-height:1.5;color:#FF8A85}
.migrate-warning .ph{font-size:20px;flex-shrink:0;margin-top:1px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div id="toast"></div>

<!-- ── Sign-in ── -->
<div id="signin-screen">
  <div class="signin-logo">🗂️</div>
  <div>
    <div class="signin-title">Life HQ</div>
    <div class="signin-sub">Your personal command centre. Sign in to sync across all devices.</div>
  </div>
  <button class="signin-btn" onclick="signIn()">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>
</div>

<!-- ── App ── -->
<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-row1">
      <div class="header-logo" onclick="openSettings()">
        <i class="ph-duotone ph-squares-four header-logo-icon"></i>
        <span class="header-title">Life HQ</span>
      </div>
      <div class="header-search">
        <i class="ph-duotone ph-magnifying-glass ph"></i>
        <input type="text" placeholder="Search tasks…" oninput="searchTasks(this.value)" id="search-input"/>
      </div>
    </div>
  </div>

  <!-- Tabs: Active / Due Soon / Overdue / Done -->
  <div class="tabs" id="tabs">

// ─── Theme ────────────────────────────────────────────────────────────────────
function initTheme(){
  const pref=settings.theme||localStorage.getItem('lifehq_theme')||'auto';
  applyTheme(pref,false);
  syncThemePicker(pref);
}

function applyTheme(pref,save=true){
  const dark=window.matchMedia('(prefers-color-scheme: dark)').matches;
  const resolved=pref==='auto'?(dark?'dark':'light'):pref;
  document.documentElement.setAttribute('data-theme',resolved);
  if(save){
    localStorage.setItem('lifehq_theme',pref);
    settings.theme=pref;
  }
}

function setTheme(pref){applyTheme(pref);syncThemePicker(pref);}

function syncThemePicker(pref){
  ['light','auto','dark'].forEach(t=>{
    document.getElementById('theme-'+t)?.classList.toggle('active',t===pref);
  });
}

// Listen for OS theme changes (when on 'auto')
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{
  const pref=settings.theme||localStorage.getItem('lifehq_theme')||'auto';
  if(pref==='auto')applyTheme('auto',false);
});

let toastTimer=null;
function showToast(msg='Saved'){
  const t=document.getElementById('toast');

  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);

window.onload=()=>{
  if(typeof google==='undefined'){setTimeout(window.onload,400);return;}
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,
    scope:'https://www.googleapis.com/auth/spreadsheets',
    callback:async(r)=>{
      if(r.error)return;
      accessToken=r.access_token;
      document.getElementById('signin-screen').style.display='none';
      document.getElementById('app').style.display='flex';
      await loadFromSheet();
    }
  });
};

function signIn(){tokenClient.requestAccessToken({prompt:''});}
function signOut(){
  google.accounts.oauth2.revoke(accessToken,()=>{

    document.getElementById('app').style.display='none';
    document.getElementById('signin-screen').style.display='flex';

// ─── Sheets I/O ───────────────────────────────────────────────────────────────
async function loadFromSheet(){
  try{
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1!A1:B1`,{headers:{Authorization:`Bearer ${accessToken}`}});
    if(r.status===401){tokenClient.requestAccessToken({prompt:''});return;}
    const d=await r.json();
    const v=d.values?.[0]||[];
    tasks=v[0]?JSON.parse(v[0]):[];
    settings=v[1]?JSON.parse(v[1]):{};
    if(!tasks.length){tasks=SEED_TASKS.map((t,i)=>({...t,createdAt:Date.now()-i*1000}));await saveToSheet();}
    initTheme();rebuildAreaSelect();renderAll();
  }catch(e){console.error(e);}
}

async function saveToSheet(){
  try{
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1!A1:B1?valueInputOption=RAW`,{
      method:'PUT',
      headers:{Authorization:`Bearer ${accessToken}`,'Content-Type':'application/json'},
      body:JSON.stringify({values:[[JSON.stringify(tasks),JSON.stringify(settings)]]})
    });
  }catch(e){console.error(e);}
}

function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveToSheet,800);}

// ─── Areas ────────────────────────────────────────────────────────────────────
function getAreas(){
  const hidden=settings.hiddenAreas||[];
  const out={};
  Object.keys(AREAS_DEFAULT).forEach(k=>{if(!hidden.includes(k))out[k]=AREAS_DEFAULT[k];});
  (settings.customAreas||[]).forEach(a=>{if(!hidden.includes(a.key))out[a.key]={icon:a.icon||'ph-tag',label:a.label};});
  return out;
}

function areaLabel(k){
  if(settings['label_'+k])return settings['label_'+k];
  if(AREAS_DEFAULT[k])return AREAS_DEFAULT[k].label;
  const ca=(settings.customAreas||[]).find(a=>a.key===k);
  return ca?ca.label:k;
}

function areaIcon(k){
  if(AREAS_DEFAULT[k])return AREAS_DEFAULT[k].icon;
  const ca=(settings.customAreas||[]).find(a=>a.key===k);
  return ca?(ca.icon||'ph-tag'):'ph-tag';
}

// ─── Search ───────────────────────────────────────────────────────────────────
function searchTasks(q){searchQuery=q.toLowerCase();render();}

// ─── Filter logic ─────────────────────────────────────────────────────────────
function getFiltered(){
  return tasks.filter(t=>{
    // Tab filter
    if(activeTab==='active'&&t.done)return false;
    if(activeTab==='active'&&isOverdue(t))return false; // overdue shows separately
    if(activeTab==='due-soon'&&(t.done||!isDueSoon(t)))return false;
    if(activeTab==='overdue'&&(t.done||!isOverdue(t)))return false;
    if(activeTab==='done'&&!t.done)return false;
    // Area filter
    if(activeArea!=='all'&&t.area!==activeArea)return false;
    // Search
    if(searchQuery){const h=(t.title+(t.notes||'')+(t.blocked||'')).toLowerCase();if(!h.includes(searchQuery))return false;}
    return true;
  });
}

function sortTasks(list){
  return list.slice().sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;
    if(a.deadline&&b.deadline)return new Date(a.deadline)-new Date(b.deadline);
    if(a.deadline)return-1;if(b.deadline)return 1;
    return(a.createdAt||0)-(b.createdAt||0);
  });
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function isOverdue(t){if(!t.deadline||t.done)return false;return new Date(t.deadline+'T00:00:00')<new Date(new Date().toDateString());}
function isDueSoon(t){if(!t.deadline||t.done)return false;const diff=(new Date(t.deadline+'T00:00:00')-new Date())/86400000;return diff>=0&&diff<=7;}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderAll(){updateTabCounts();render();}

function render(){
  if(currentView==='weekly'){renderWeekly();return;}
  const allFiltered=sortTasks(getFiltered());
  const el=document.getElementById('task-list');

  if(!allFiltered.length){
    el.innerHTML=`<div class="empty-state"><i class="ph-duotone ph-check-circle ph"></i><p>Nothing here.</p></div>`;
    return;
  }

  // Group by area
  const areas=getAreas();
  // Determine which areas to show (maintain area definition order)
  const areaKeys=Object.keys(areas);
  // Also include any area keys found in tasks that may not be in current areas (edge case)
  allFiltered.forEach(t=>{if(!areaKeys.includes(t.area))areaKeys.push(t.area);});

  let html='';
  let anyContent=false;

  // If filtering to a specific area, just show that area
  const areaScope=activeArea==='all'?areaKeys:[activeArea];

  areaScope.forEach(k=>{
    const areaName=areaLabel(k);
    const icon=areaIcon(k);
    const areaTasksAll=allFiltered.filter(t=>t.area===k);
    if(activeArea==='all'&&areaTasksAll.length===0)return; // skip empty areas when showing all

    anyContent=true;
    html+=`<div class="area-group">
      <div class="area-group-header"><i class="ph-duotone ${icon} ph"></i>${escHtml(areaName)}</div>
      <div class="area-group-tasks" id="agroup-${k}">`;

    if(areaTasksAll.length){
      html+=areaTasksAll.map(renderCard).join('');
    } else {
      html+=`<div class="area-group-empty">No tasks here.</div>`;
    }
    html+=`</div></div>`;
  });

  if(!anyContent){
    html=`<div class="empty-state"><i class="ph-duotone ph-check-circle ph"></i><p>Nothing here.</p></div>`;
  }

  el.innerHTML=html;
  allFiltered.forEach(t=>initSwipe(document.getElementById('wrapper-'+t.id),t.id));
}

function renderCard(t){
  let dl='';
  if(t.deadline){

// ─── Swipe gestures ───────────────────────────────────────────────────────────
function initSwipe(wrapper,taskId){
  if(!wrapper)return;
  const card=wrapper.querySelector('.task-card');
  const bgRight=wrapper.querySelector('.swipe-bg-right');
  const bgLeft=wrapper.querySelector('.swipe-bg-left');
  let sx=0,sy=0,dragging=false;
  const THRESH=90;
  card.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;dragging=false;card.style.transition='';},{passive:true});
  card.addEventListener('touchmove',e=>{
    const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
    if(!dragging&&Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>8)return;
    if(!dragging&&Math.abs(dx)>8)dragging=true;
    if(!dragging)return;
    card.style.transform=`translateX(${dx}px)`;
    const pct=Math.min(Math.abs(dx)/THRESH,1);
    if(dx>0){bgRight.style.opacity=pct;bgLeft.style.opacity=0;}
    else{bgLeft.style.opacity=pct;bgRight.style.opacity=0;}
  },{passive:true});
  card.addEventListener('touchend',e=>{
    if(!dragging){bgRight.style.opacity=0;bgLeft.style.opacity=0;return;}
    const dx=e.changedTouches[0].clientX-sx;
    if(dx>THRESH){
      card.style.transition='transform .25s,opacity .25s';card.style.transform='translateX(110vw)';card.style.opacity='0';
      setTimeout(()=>toggleDone(taskId),250);
    } else if(dx<-THRESH){
      card.style.transition='transform .25s,opacity .25s';card.style.transform='translateX(-110vw)';card.style.opacity='0';
      setTimeout(()=>deleteTask(taskId,true),250);
    } else {
      card.style.transition='transform .2s';card.style.transform='';
      setTimeout(()=>{card.style.transition='';bgRight.style.opacity=0;bgLeft.style.opacity=0;},200);
    }
  });
}

function editTask(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  document.getElementById('modal-title').textContent='Edit Task';
  document.getElementById('edit-id').value=id;
  document.getElementById('f-title').value=t.title;
  document.getElementById('f-area').value=t.area;
  document.getElementById('f-deadline').value=t.deadline||'';
  document.getElementById('f-blocked').value=t.blocked||'';
  document.getElementById('f-notes').value=t.notes||'';
  updateBlockedDisplay((t.blocked||'').split(';').map(s=>s.trim()).filter(Boolean));
  document.getElementById('task-modal').classList.add('open');
}

function saveTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return;}
  const editId=document.getElementById('edit-id').value;
  const data={title,area:document.getElementById('f-area').value,deadline:document.getElementById('f-deadline').value||'',blocked:document.getElementById('f-blocked').value,notes:document.getElementById('f-notes').value.trim()};
  if(editId){const i=tasks.findIndex(t=>t.id===editId);if(i!==-1)tasks[i]={...tasks[i],...data};}
  else tasks.push({id:Date.now().toString(),done:false,createdAt:Date.now(),...data});
  scheduleSave();closeModal();renderAll();
  showToast(editId?'Task updated':'Task saved');
}

function deleteTask(id,skipConfirm=false){
  if(!skipConfirm&&!confirm('Delete this task?'))return;
  tasks=tasks.filter(t=>t.id!==id);scheduleSave();renderAll();
}

function toggleDone(id){
  const t=tasks.find(t=>t.id===id);
  if(t){t.done=!t.done;t.doneAt=t.done?Date.now():null;}
  scheduleSave();renderAll();
  if(t?.done)showToast('Done ✓');
}

function closeModal(){document.getElementById('task-modal').classList.remove('open');}

function toggleBlockedTask(title){
  const idx=blockedPickerSelected.indexOf(title);
  if(idx>=0)blockedPickerSelected.splice(idx,1);else blockedPickerSelected.push(title);
  renderBlockedPicker(document.getElementById('blocked-search').value.toLowerCase());
}

function renderBlockedChipsPreview(){
  document.getElementById('blocked-chips-preview').innerHTML=blockedPickerSelected.map(t=>
    `<div class="blocked-chip" onclick="removeBlockedChip('${escHtml(t).replace(/'/g,'&#39;')}')"><i class="ph-duotone ph-x"></i>${escHtml(t)}</div>`).join('');
}

function removeBlockedChip(title){
  blockedPickerSelected=blockedPickerSelected.filter(t=>t!==title);
  renderBlockedPicker(document.getElementById('blocked-search').value.toLowerCase());
}

function saveBlockedPicker(){
  document.getElementById('f-blocked').value=blockedPickerSelected.join('; ');
  updateBlockedDisplay(blockedPickerSelected);
  closeBlockedPicker();
}

function closeBlockedPicker(){document.getElementById('blocked-modal').classList.remove('open');}

function updateBlockedDisplay(titles){
  document.getElementById('blocked-placeholder').style.display=titles.length?'none':'';
  document.getElementById('blocked-field-chips').innerHTML=titles.map(t=>`<span class="bf-chip">${escHtml(t)}</span>`).join('');
}

// ─── Settings ─────────────────────────────────────────────────────────────────
function openSettings(){
  syncThemePicker(settings.theme||localStorage.getItem('lifehq_theme')||'auto');
  renderSettingsAreas();
  document.getElementById('settings-modal').classList.add('open');
}

function renderSettingsAreas(){
  const defaultRows=Object.keys(AREAS_DEFAULT).map(k=>{
    if((settings.hiddenAreas||[]).includes(k))return'';
    return`<div class="settings-area-item">
      <div class="settings-area-icon"><i class="ph-duotone ${areaIcon(k)}"></i></div>
      <input class="settings-area-input" id="setting-${k}" value="${escHtml(areaLabel(k))}" placeholder="${AREAS_DEFAULT[k].label}"/>
      <button class="settings-area-del" onclick="promptDeleteArea('${k}')"><i class="ph-duotone ph-trash"></i></button>
    </div>`;
  }).join('');
  const customRows=(settings.customAreas||[]).map(a=>{
    if((settings.hiddenAreas||[]).includes(a.key))return'';
    return`<div class="settings-area-item">
      <div class="settings-area-icon"><i class="ph-duotone ph-tag"></i></div>
      <input class="settings-area-input" id="setting-${a.key}" value="${escHtml(a.label)}" placeholder="Area name"/>
      <button class="settings-area-del" onclick="promptDeleteArea('${a.key}')"><i class="ph-duotone ph-trash"></i></button>
    </div>`;
  }).join('');
  document.getElementById('settings-areas-list').innerHTML=defaultRows+customRows;
}

function addNewArea(){
  if(!settings.customAreas)settings.customAreas=[];
  const key='custom_'+Date.now();
  settings.customAreas.push({key,label:'New Area',icon:'ph-tag'});
  renderSettingsAreas();
  setTimeout(()=>{const el=document.getElementById('setting-'+key);if(el){el.focus();el.select();}},50);
}

function saveSettings(){
  Object.keys(AREAS_DEFAULT).forEach(k=>{
    const el=document.getElementById('setting-'+k);
    if(el){const v=el.value.trim();if(v)settings['label_'+k]=v;}
  });
  (settings.customAreas||[]).forEach(a=>{
    const el=document.getElementById('setting-'+a.key);
    if(el){const v=el.value.trim();if(v)a.label=v;}
  });
  scheduleSave();rebuildAreaSelect();closeSettings();renderAll();
  showToast('Settings saved');
}

function closeSettings(){document.getElementById('settings-modal').classList.remove('open');}

// ─── Delete area ──────────────────────────────────────────────────────────────
function promptDeleteArea(key){
  closeSettings();
  pendingDeleteAreaKey=key;
  const count=tasks.filter(t=>t.area===key&&!t.done).length;
  const areas=getAreas();
  const others=Object.keys(areas).filter(k=>k!==key);
  document.getElementById('delete-area-title').textContent=`Delete ${areaLabel(key)}`;
  document.getElementById('delete-area-warning').textContent=
    count?`This area has ${count} active task${count!==1?'s':''}. Choose where to move them.`:'No active tasks. Safe to remove.';
  document.getElementById('migrate-target').innerHTML=others.map(k=>`<option value="${k}">${areaLabel(k)}</option>`).join('');
  document.getElementById('migrate-select-wrap').style.display=count?'':'none';
  document.getElementById('delete-area-modal').classList.add('open');
}

function confirmDeleteArea(){
  if(!pendingDeleteAreaKey)return;
  const target=document.getElementById('migrate-target').value;
  if(target)tasks=tasks.map(t=>t.area===pendingDeleteAreaKey?{...t,area:target}:t);
  if(!settings.hiddenAreas)settings.hiddenAreas=[];
  settings.hiddenAreas.push(pendingDeleteAreaKey);
  pendingDeleteAreaKey=null;
  scheduleSave();closeDeleteAreaModal();rebuildAreaSelect();renderAll();
}

function closeDeleteAreaModal(){document.getElementById('delete-area-modal').classList.remove('open');pendingDeleteAreaKey=null;}

// ─── Keyboard & overlays ──────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeBlockedPicker();closeSettings();closeDeleteAreaModal();closeAreasSheet();}
  if(e.key==='n'&&!['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName))openAddModal();
});
['task-modal','blocked-modal','settings-modal','delete-area-modal','areas-modal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{if(e.target.id===id)e.target.classList.remove('open');});
});
</script>
